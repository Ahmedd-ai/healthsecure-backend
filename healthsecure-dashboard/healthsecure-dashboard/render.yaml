services:
  - type: web
    name: healthsecure-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER_MONGO_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
